name: Daily Fetch

on:
  schedule:
    # 21:45 Asia/Shanghai = 13:45 UTC
    - cron: "45 13 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-fetch
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run collector
        shell: pwsh
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File .\build-data.ps1

      - name: Commit generated data
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:$env:GH_TOKEN@github.com/${{ github.repository }}.git"
          git add .
          git diff --cached --quiet
          if ($LASTEXITCODE -eq 0) {
            Write-Host "No generated changes to commit."
            exit 0
          }
          $timestamp = Get-Date -Format "yyyy-MM-dd HH:mm:ss"
          git commit -m "daily fetch $timestamp"
          git pull --rebase origin main
          git push origin HEAD:main
